namespace: garuda
name: ipt-server
images:
  iptServer: ""
  powerdns: ""
  frr: ""
routes: []
pbrInterfaces:
  - backbone
nicAttach:
  - backbone
cleanConntrack: false
domainRouteTtl: 300
pinningEgress: {}
pinningTtl: 86400
pinningApiPort: 80
mtuPolicy:
  # Transit TCP MSS clamp on backbone (both iifname and oifname).
  # Fixed MSS because ipt-server owns only the 1500 backbone iface; clamp-to-pmtu
  # would be a no-op there.  Default 1240 = chain-B wg-firezone floor, >= QUIC 1200.
  fixedMss: 1240
  # Set to false to skip ipt_server_mss nftables table installation entirely.
  mssClampEnabled: true
labels: {}
# ospf is null when omitted; FRR sidecar is then NOT rendered.
ospf: null
