apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name | quote }}
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "iptServer.labels" . | nindent 4 }}
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      {{- include "iptServer.selector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "iptServer.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        garuda.env-config/checksum: {{ include (print $.Template.BasePath "/configmap-env.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: Always
      # Match the existing docker-compose stack's sysctls. ip_forward
      # and rp_filter=2 are flagged "unsafe" by upstream kubelet and
      # must be allow-listed at k3s install time. See
      # examples/mini-site/infra/yc.tf module "k3s_init_hub".
      securityContext:
        sysctls:
          - name: net.ipv4.ip_forward
            value: "1"
          - name: net.ipv4.conf.all.rp_filter
            value: "2"
      # PowerDNS hook.lua connects to the ipt-server WebSocket backend at
      # ws://127.0.0.1:8765/. Containers share the pod netns so loopback
      # is the correct address. No hostAliases needed.
      containers:
        - name: ipt-server
          image: {{ .Values.images.iptServer | default (printf "ghcr.io/garuda-tunnel/garuda-ipt-server:%s" .Chart.Version) | quote }}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: {{ .Values.name }}-env
          ports:
            - name: pinning-api
              containerPort: {{ int .Values.pinningApiPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 10
          env:
            - name: IPT_DNS_BACKEND_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
        - name: powerdns
          image: {{ .Values.images.powerdns | default (printf "ghcr.io/garuda-tunnel/garuda-powerdns:%s" .Chart.Version) | quote }}
          imagePullPolicy: IfNotPresent
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ss -H -ltn sport = :1053
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
