namespace: garuda
name: ipt-server
images:
  iptServer: ghcr.io/garuda-tunnel/garuda-ipt-server:latest
  powerdns: ghcr.io/garuda-tunnel/garuda-powerdns:latest
routes:
  - route:
      - gw: 192.0.2.130
      - dev: border
    rules:
      - ".*"
      - "0.0.0.0/0"
pbrInterfaces:
  - backbone
nicAttach:
  - backbone
  - border
cleanConntrack: false
domainRouteTtl: 300
pinningEgress: {}
pinningTtl: 86400
pinningApiPort: 80
mtuPolicy:
  fixedMss: 1240
  mssClampEnabled: true
labels: {}
podLabels:
  net.garuda-tunnel/profile: transit-provider
podAnnotations:
  net.garuda-tunnel/router-id: 198.51.100.99
  k8s.v1.cni.cncf.io/networks: backbone@backbone
ospf: null
