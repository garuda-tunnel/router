---
# Source: ipt-server/templates/configmap-env.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ipt-server-env
  namespace: "garuda"
  labels:
    app.kubernetes.io/name: ipt-server
    app.kubernetes.io/instance: "ipt-server"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: garuda
    garuda.managed-by: helm
data:
  # This ConfigMap is the source of truth for the ipt-server container's environment.
  # None of these are sensitive values; they are routes, interface names, TTLs, and a port number.
  IPT_INTERFACES_JSON: "[\"backbone\"]"
  IPT_ROUTES_JSON: "[{\"route\":[{\"gw\":\"192.0.2.130\"},{\"dev\":\"border\"}],\"rules\":[\".*\",\"0.0.0.0/0\"]}]"
  IPT_NIC_ATTACH: "[\"backbone\",\"border\"]"
  IPT_CLEAN_CONNTRACK: "false"
  IPT_DOMAIN_ROUTE_TTL: "300"
  IPT_PINNING_EGRESS_JSON: "{}"
  IPT_PINNING_TTL: "86400"
  IPT_PINNING_API_PORT: "80"
  IPT_FIXED_MSS: "1240"
  IPT_MSS_CLAMP_ENABLED: "true"

---
# Source: ipt-server/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "ipt-server"
  namespace: "garuda"
  labels:
    app.kubernetes.io/name: ipt-server
    app.kubernetes.io/instance: "ipt-server"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: garuda
    garuda.managed-by: helm
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ipt-server
      app.kubernetes.io/instance: "ipt-server"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ipt-server
        app.kubernetes.io/instance: "ipt-server"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: garuda
        garuda.managed-by: helm
      annotations:
        garuda.env-config/checksum: 4201e1ff916d5e13744eadf86120ae48f2706c0f9a6ead84d3c8ebef3598bbf3
    spec:
      restartPolicy: Always
      # Match the existing docker-compose stack's sysctls. ip_forward
      # and rp_filter=2 are flagged "unsafe" by upstream kubelet and
      # must be allow-listed at k3s install time. See
      # examples/mini-site/infra/yc.tf module "k3s_init_hub".
      securityContext:
        sysctls:
          - name: net.ipv4.ip_forward
            value: "1"
          - name: net.ipv4.conf.all.rp_filter
            value: "2"
      # PowerDNS hook.lua connects to the ipt-server WebSocket backend at
      # ws://127.0.0.1:8765/. Containers share the pod netns so loopback
      # is the correct address. No hostAliases needed.
      containers:
        - name: ipt-server
          image: "ghcr.io/garuda-tunnel/garuda-ipt-server:latest"
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ipt-server-env
          ports:
            - name: pinning-api
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 10
          env:
            - name: IPT_DNS_BACKEND_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
        - name: powerdns
          image: "ghcr.io/garuda-tunnel/garuda-powerdns:latest"
          imagePullPolicy: IfNotPresent
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ss -H -ltn sport = :1053
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
