# Source: ipt-server/templates/configmap-env.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ipt-server-env
  namespace: "garuda"
  labels:
    app.kubernetes.io/name: ipt-server
    app.kubernetes.io/instance: "ipt-server"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: garuda
    garuda.managed-by: helm
data:
  # This ConfigMap is the source of truth for the ipt-server container's environment.
  # None of these are sensitive values; they are routes, interface names, TTLs, and a port number.
  IPT_INTERFACES_JSON: "[\"backbone\"]"
  IPT_ROUTES_JSON: "[{\"route\":[{\"gw\":\"192.0.2.130\"},{\"dev\":\"border\"}],\"rules\":[\".*\",\"0.0.0.0/0\"]}]"
  IPT_NIC_ATTACH: "[\"backbone\",\"border\"]"
  IPT_CLEAN_CONNTRACK: "false"
  IPT_DOMAIN_ROUTE_TTL: "300"
  IPT_PINNING_EGRESS_JSON: "{}"
  IPT_PINNING_TTL: "86400"
  IPT_PINNING_API_PORT: "80"
  IPT_FIXED_MSS: "1240"
  IPT_MSS_CLAMP_ENABLED: "true"

---
# Source: ipt-server/templates/configmap-frr.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: "ipt-server-frr"
  namespace: "garuda"
data:
  frr.conf: |
    frr defaults traditional
    log file /tmp/frr.log
    zebra nexthop proto only
    
    route-map TRANSIT_ORIGINATE permit 10
     set tag 201
     set metric 100
     set metric-type type-2
    interface backbone
     ip ospf area 0.0.0.0
    ip ospf hello-interval 5
     ip ospf dead-interval 15
     ip ospf mtu-ignore
    router ospf
     ospf router-id 198.51.100.99
    
     default-information originate always metric 100 metric-type 2 route-map TRANSIT_ORIGINATE
  daemons: |
    zebra=yes
    ospfd=yes
  vtysh.conf: |
    service integrated-vtysh-config

