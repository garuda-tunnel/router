# Source: ipt-server/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "ipt-server"
  namespace: "garuda"
  labels:
    app.kubernetes.io/name: ipt-server
    app.kubernetes.io/instance: "ipt-server"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: garuda
    garuda.managed-by: helm
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ipt-server
      app.kubernetes.io/instance: "ipt-server"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ipt-server
        app.kubernetes.io/instance: "ipt-server"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: garuda
        garuda.managed-by: helm
      annotations:
        k8s.v1.cni.cncf.io/networks: "backbone@backbone,border@border"
        garuda.runtime-patches/checksum: 78282f760c82668f528b0065b3a7edc260424c53ec159368ca7f325a35f84947
        garuda.env-config/checksum: 4201e1ff916d5e13744eadf86120ae48f2706c0f9a6ead84d3c8ebef3598bbf3
        checksum/frr-config: 0f2bbce6c55a68ef9db7c260c15f3d574e2c990a8e71c3aa848f9971a2ecb831
    spec:
      restartPolicy: Always
      # Match the existing docker-compose stack's sysctls. ip_forward
      # and rp_filter=2 are flagged "unsafe" by upstream kubelet and
      # must be allow-listed at k3s install time. See
      # examples/mini-site/infra/yc.tf module "k3s_init_hub".
      securityContext:
        sysctls:
          - name: net.ipv4.ip_forward
            value: "1"
          - name: net.ipv4.conf.all.rp_filter
            value: "2"
      volumes:
        - name: runtime-patches
          configMap:
            name: ipt-server-runtime-patches
        - name: frr-source
          configMap:
            name: ipt-server-frr
      # PowerDNS hook.lua connects to the ipt-server WebSocket backend at
      # ws://127.0.0.1:8765/. Containers share the pod netns so loopback
      # is the correct address. No hostAliases needed.
      containers:
        - name: ipt-server
          image: "ghcr.io/garuda-tunnel/garuda-ipt-server:latest"
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ipt-server-env
          ports:
            - name: pinning-api
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 10
          volumeMounts:
            - name: runtime-patches
              mountPath: /runtime-patches
              readOnly: true
          env:
            - name: PYTHONPATH
              value: /runtime-patches
            - name: IPT_DNS_BACKEND_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
        - name: powerdns
          image: "ghcr.io/garuda-tunnel/garuda-powerdns:latest"
          imagePullPolicy: IfNotPresent
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ss -H -ltn sport = :1053
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
        - name: frr-sidecar
          image: "ghcr.io/garuda-tunnel/garuda-frr-sidecar:latest"
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: frr-source
              mountPath: /etc/frr-source
              readOnly: true
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW", "SYS_ADMIN"]
